<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VitScan AI | Diagnostic Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #ffffff; --active-teal: #00796b; --bg-light: #f4f7f6; --accent-pink: #ff4d6d; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); margin: 0; }

        .sidebar { width: 260px; height: 100vh; background: var(--sidebar-bg); position: fixed; border-right: 1px solid #eee; padding: 20px 0; }
        .sidebar-header h4 { color: var(--accent-pink); font-weight: 700; padding: 0 25px; margin-bottom: 25px; }
        .nav-link { padding: 14px 25px; color: #555; text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-link.active { background: var(--active-teal); color: white !important; }

        .main-content { margin-left: 260px; padding: 30px; }
        .report-card { background: white; border-radius: 15px; border: none; transition: 0.3s; overflow: hidden; }
        .report-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .scan-img { height: 180px; object-fit: cover; width: 100%; border-bottom: 1px solid #eee; }
        .deficiency-tag { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h4>VitScan AI</h4></div>
        <nav>
            <a href="/admin_dash" class="nav-link"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a href="/train_dataset" class="nav-link"><i class="bi bi-cpu-fill"></i> Train Dataset</a>
            <a href="/user_details" class="nav-link"><i class="bi bi-people-fill"></i> User Details</a>
            <a href="/reports" class="nav-link active"><i class="bi bi-file-earmark-bar-graph-fill"></i> Reports</a>
            <a href="/logout" class="nav-link text-danger mt-5"><i class="bi bi-box-arrow-left"></i> Log Out</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">Diagnostic History</h3>
            <div class="btn-group">
                <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-filter"></i> Filter</button>
                <button class="btn btn-primary btn-sm ms-2"><i class="bi bi-download"></i> Export All</button>
            </div>
        </div>

        <div class="row g-4">
            {% for report in reports %}
            <div class="col-md-4">
                <div class="report-card shadow-sm">
                    <img src="{{ url_for('static', filename=report.image_path) }}" class="scan-img" alt="Patient Scan">
                    <div class="p-3">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 class="fw-bold mb-0 text-truncate" style="max-width: 150px;">{{ report.name }}</h6>
                            <span class="deficiency-tag bg-danger bg-opacity-10 text-danger">{{ report.result }}</span>
                        </div>
                        <p class="text-muted small mb-3" style="height: 40px; overflow: hidden;">
                            {{ report.advice }}
                        </p>
                        <hr class="my-2 opacity-25">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-secondary"><i class="bi bi-calendar3 me-1"></i> {{ report.created_at.strftime('%d %b, %y') }}</small>
                            <a href="#" class="btn btn-sm btn-light text-primary"><i class="bi bi-eye"></i></a>
                        </div>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center py-5">
                <i class="bi bi-folder-x display-1 text-light"></i>
                <p class="text-muted">No diagnostic reports found in database.</p>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
