<!DOCTYPE html>
<html lang="en">
<head>
    <title>VitScan AI | Training Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: 'Poppins', sans-serif; }
        .result-card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .img-fluid { border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="fw-bold mb-4">Final Training Analytics</h2>

        <div class="row">
            <div class="col-md-12">
                <div class="result-card">
                    <h5>Accuracy & Loss Performance</h5>
                    <img src="{{ url_for('static', filename='results/accuracy_plot.png') }}" class="img-fluid w-100">
                </div>
            </div>

            <div class="col-md-6">
                <div class="result-card">
                    <h5>Confusion Matrix (Class-wise)</h5>
                    <img src="{{ url_for('static', filename='results/confusion_matrix.png') }}" class="img-fluid w-100">
                </div>
            </div>

            <div class="col-md-6">
                <div class="result-card">
                    <h5>Classification Metrics</h5>
                    <div class="table-responsive">
                        {{ report|safe }}
                    </div>
                </div>
            </div>
        </div>

        <a href="/admin_dash" class="btn btn-primary rounded-pill px-4">Back to Dashboard</a>
    </div>
</body>
</html>
